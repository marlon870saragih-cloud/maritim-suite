<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Maritime Suite — Masuk (Preview)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
<style>
  :root{
    --background:#0A1628; --surface:#071325;
    --card-bg:#09162A; --card-border:#0E2240; --border-muted:#1E3A5F;
    --text-primary:#F0F4FF; --text-secondary:#8BA4C0;
    --accent-blue:#3B9EFF; --btn:#2E86DE; --status-danger:#E74C3C;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Inter',system-ui,sans-serif;
    background:var(--background);
    color:var(--text-primary);
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    padding:16px;-webkit-font-smoothing:antialiased;
  }
  .wrap{width:100%;max-width:448px}

  /* Brand */
  .brand{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:32px}
  .brand .logo{
    width:40px;height:40px;border-radius:6px;
    background:rgba(59,158,255,.2);border:1px solid rgba(59,158,255,.3);
    display:grid;place-items:center;color:var(--accent-blue);
  }
  .brand .name{font-family:'DM Serif Display',serif;font-size:1.25rem;line-height:1.1;color:var(--text-primary)}
  .brand .sub{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-secondary);margin-top:2px}

  /* Card */
  .card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:12px;padding:32px}
  .card h1{font-family:'DM Serif Display',serif;font-size:1.6rem;color:#fff;margin-bottom:4px}
  .card .lead{color:var(--text-secondary);font-size:.875rem;margin-bottom:24px}

  .field{margin-bottom:16px}
  label{display:block;font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.05em;text-transform:uppercase;color:var(--text-secondary);margin-bottom:6px}
  input{
    width:100%;background:var(--surface);border:1px solid var(--border-muted);
    border-radius:4px;padding:10px 12px;font-size:.875rem;color:var(--text-primary);
    font-family:'Inter',sans-serif;transition:border-color .15s,box-shadow .15s;
  }
  input::placeholder{color:rgba(139,164,192,.5)}
  input:focus{outline:none;border-color:var(--accent-blue);box-shadow:0 0 0 1px rgba(59,158,255,.4)}

  .btn{
    width:100%;background:var(--btn);color:#fff;border:0;border-radius:4px;
    padding:11px;font-size:.875rem;font-weight:500;cursor:pointer;margin-top:4px;
    transition:background .15s;
  }
  .btn:hover{background:var(--accent-blue)}

  .foot{color:var(--text-secondary);font-size:.875rem;text-align:center;margin-top:24px}
  .foot a{color:var(--accent-blue);text-decoration:none}
  .foot a:hover{text-decoration:underline}

  .preview-tag{
    position:fixed;top:14px;right:14px;
    font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--text-secondary);background:rgba(255,255,255,.04);
    border:1px solid var(--border-muted);padding:5px 10px;border-radius:999px;
  }
</style>
</head>
<body>

<div class="preview-tag">Preview tampilan</div>

<div class="wrap">
  <!-- Brand -->
  <div class="brand">
    <div class="logo">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 10.189V14M12 2v3M4.5 9 12 5l7.5 4M3 18a8 8 0 0 0 18 0M3 18l-.7-2.1a2 2 0 0 1 .9-2.4l7.8-4.3a2 2 0 0 1 2 0l7.8 4.3a2 2 0 0 1 .9 2.4L21 18"/>
      </svg>
    </div>
    <div>
      <p class="name">Maritime Suite</p>
      <p class="sub">PT Tribuana Solusi Maritim</p>
    </div>
  </div>

  <!-- Card -->
  <div class="card">
    <h1>Masuk</h1>
    <p class="lead">Kelola dokumen &amp; keuangan agen pelayaran Anda.</p>

    <form onsubmit="return false">
      <div class="field">
        <label>Email</label>
        <input type="email" placeholder="nama@perusahaan.co.id" autocomplete="email" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button class="btn" type="submit">Masuk</button>
    </form>

    <p class="foot">Belum punya akun? <a href="#">Daftar gratis</a></p>
  </div>
</div>

</body>
</html>
